{% extends "base.html" %}

{% block title %}Sign Out — Maskani{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-10 col-md-6 col-lg-4">

        <div class="card auth-card p-4 p-md-5 text-center">
            <h2 class="fw-bold mb-2">Sign out</h2>
            <p class="text-muted mb-4">Are you sure you want to sign out of Maskani?</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
                    Yes, sign me out
                </button>
            </form>

            <div class="mt-3">
                <a href="/" class="text-decoration-none small">Cancel</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
